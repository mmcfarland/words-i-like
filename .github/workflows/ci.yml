name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check:quick
      - run: pnpm test
      - run: pnpm build

  e2e:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: docker compose -f docker/docker-compose.yml up -d db api
      - run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:3001/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose -f docker/docker-compose.yml logs api db
          exit 1
      - run: npx playwright install chromium --with-deps
      - run: pnpm test:e2e
      - run: pnpm test:visual
      - if: always()
        run: docker compose -f docker/docker-compose.yml down -v
