services:
  db:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_DB: words
      POSTGRES_USER: words
      POSTGRES_PASSWORD: words
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U words"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://words:words@db:5432/words
      PORT: "3001"
    volumes:
      - ../apps/api/src:/app/apps/api/src
      - ../packages/shared/src:/app/packages/shared/src
      - ../packages/db/src:/app/packages/db/src
      - ../packages/db/prisma:/app/packages/db/prisma
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ../apps/web/src:/app/apps/web/src
      - ../apps/web/index.html:/app/apps/web/index.html
      - ../packages/shared/src:/app/packages/shared/src
    depends_on:
      - api

volumes:
  pgdata:
